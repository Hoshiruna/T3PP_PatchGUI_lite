name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore PatchGUIlite/PatchGUIlite.csproj

      - name: Publish (Hybrid Bundle)
        run: >
          dotnet publish PatchGUIlite/PatchGUIlite.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Platform=x64
          -p:PublishSingleFile=true
          -p:ExposeManagedAssemblyInPublish=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/hybrid-win-x64

      - name: Remove PDB from artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path artifacts -Recurse -Include *.pdb | Remove-Item -Force

      - name: Zip artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/hybrid-win-x64/*" -DestinationPath "PatchGUIlite-${{ github.ref_name }}-hybrid-win-x64.zip" -Force

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PatchGUIlite-${{ github.ref_name }}-hybrid-win-x64.zip
